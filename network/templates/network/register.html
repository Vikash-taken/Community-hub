{% extends "network/layout.html" %}
{% load static %}

{% block head %}
<link href="{% static 'network/login.css' %}" rel="stylesheet">
{% endblock %}

{% block body %}

    {% if message %}
        <div>{{ message }}</div>
    {% endif %}

    <div class="container">
      <div class="login-card">
        <div class="info-side register-bg">
          <h2>Welcome to Trollit</h2>
          <p class="mt-3">Chill and have fun</p>
        </div>

        <div class="form-side">
            <form action="{% url 'network:register' %}" method="post">
                {% csrf_token %}
                <h3>REGISTER</h3>
                <div class="form-group pt-0 mt-0">
                    <input autofocus type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group pt-0 mt-0">
                    <input type="email" name="email" placeholder="Email Address">
                </div>
                <div class="form-group pt-0 mt-0">
                    <input type="password" name="password" placeholder="Password">
                </div>
                <div class="form-group pt-0 mt-0">
                    <input type="password" name="confirmation" placeholder="Confirm Password">
                </div>
                <button type="submit" class=login-btn>REGISTER</button>
            </form>

            Already have an account? <a href="{% url 'network:login' %}">Log In here.</a>
        </div>
      </div>
    </div>

{% endblock %}
