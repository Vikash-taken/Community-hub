<div calss="info-card">
  <div>
    <span><img src="{{ post.user.profile_pic.url }}" /></span>
    <h4>{{ post.title }}</h4>
    <p>{{ post.content }}</p>
    <img src="{{ post.image_post.url }}" />
    <span>{{ post.upvote }}</span>
    <span>{{ post.downvote }}</span>
  </div>
  <div class="card-date">{{ post.post_created }}</div>
</div>
